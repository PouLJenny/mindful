# ─── KitchenLoop Configuration ───────────────────────────────────────────
# Generated by kitchenloop init on 2026-05-05T07:55:22Z

project:
  name: mindful
  description: "A command-line meditation companion. Single-user, local-only, no network"
  language: python
  context: |
    mindful is a python project (cli).
    A command-line meditation companion. Single-user, local-only, no network

    A typical user session:

    Success = The user can complete their task without confusion or errors.

repo:
  base_branch: main
  pr_target: main
  iteration_branch_prefix: kitchen/iter
  env_file: .env

paths:
  reports: docs/internal/reports
  loop_state: docs/internal/loop-state.md
  patterns: memory/codebase-patterns.md
  logs: .kitchenloop/logs
  scenarios: scenarios/incubating
  worktree_prefix: .claude/worktrees
  execute_worktree: .claude/worktrees/kitchenloop
  uat_cards: .kitchenloop/uat-cards
  uat_runs: .kitchenloop/uat-runs
  unbeatable_tests: .kitchenloop/unbeatable-tests.md

spec:
  docs:
    - "README.md"
    - "docs/spec.md"

  dimensions:
    subcommands:
      - "start"
      - "note"
      - "stats"
      - "history"
      - "config"

    duration:
      - "1min"
      - "10min"
      - "30min"
      - "custom"

    mode:
      - "bell_only"
      - "voice_guide"
      - "breath_pacing"

    state_condition:
      - "first_ever_session"
      - "active_streak"
      - "broken_streak"
      - "interrupted_session"
      - "data_corrupt"

  blocked:
    - subcommands: note
      mode: "*"
    - subcommands: config
      duration: "*"
    - subcommands: stats
      mode: "*"
    - subcommands: history
      mode: "*"

verification:
  oracle:
    type: deterministic
    full_command: pytest
    quick_command: "pytest tests/smoke/ -x"
    smoke_command: "pytest tests/smoke/ -x"    # L3 4-layer smoke; see .kitchenloop/unbeatable-tests.md
    lint_command: "ruff check ."
    security_command: 
    build_command: 

  stop_conditions:
    pass_rate_floor: 0.80         # 试运行可以宽松些,跑稳后改 0.95
    max_consecutive_failures: 3

ticketing:
  provider: github
  github:
    labels:
      bug: bug
      feature: enhancement
      improvement: improvement
      exploration: exploration
    state_labels:
      todo: kitchenloop:todo
      in_progress: kitchenloop:in-progress
      in_review: kitchenloop:in-review
      done: kitchenloop:done

quality:
  bar_file: .kitchenloop/quality-bar.md

pr_manager:
  author_allowlist: []
  review_bot: coderabbitai
  require_ci: true
  skip_after_failures: 1

reviewers:
  codex:
    enabled: true       # 装了就开
    timeout: 30
  gemini:
    enabled: true      # 没装就关
    timeout: 60

runtime:
  # === 核心节奏控制 ===
  polish_max_prs: 5              # 一次 polish 处理 5 个 PR(原来 1 → 3 → 5)
  drain_threshold: 12            # PR 堆到 12 个时进入 drain mode(只 polish 不 ideate)
  drain_exit_threshold: 6        # drain 到 6 个以内退出
  
  # === 给 backlog/review 多的喘息 ===
  backlog_interval: 2            # 每 2 轮做一次 backlog grooming(原来 3)
  review_interval: 3             # 每 3 轮做一次 auto-review(原来 5)
  
  # === 保险:别误判退出 ===
  max_no_work_loops: 5           # 连续 5 轮没产出才退出(原来 999 太大,3 太小)
  ticket_drought_threshold: 8    # 没新 ticket 8 轮才报警
  starve_backlog_threshold: 5
  starve_skip_execute_threshold: 8
  
  # === 强制 ideate 节奏 ===
  force_ideate_interval: 5       # 每 5 轮强制做一次 ideate,防止只 polish 不探索
  
  # === Timeout(不要小气,但也别太大) ===
  timeouts:
    backlog: 900                 # 15 min
    ideate: 2700                 # 45 min(Opus 思考慢)
    triage: 1200                 # 20 min
    execute: 4500                # 75 min(execute 可能并行写 3-5 个 PR)
    polish: 7200                 # 120 min(5 个 PR × ~10 min + 缓冲)
    regress: 5400                # 90 min

# ─── UI Tests ────────────────────────────────────────────────────
# Uncomment and configure to enable --mode ui (browser-driven loop).
# Requires: app running locally + agent-browser installed (npm install -g agent-browser).
# ui_tests:
#   base_url: http://localhost:3000
#   screenshot_dir: .kitchenloop/ui-test-screenshots
#   screenshot_retention: 5
#   flows:
#     - id: example-flow
#       entry: /
#       goal: Describe what a user should accomplish
#       checkpoints:
#         - page renders without errors
#         - primary action works
#         - result visible to user

modes:
  default:
    ideate_prompt: prompts/ideate.md
  backtest:
    ideate_prompt: prompts/ideate-backtest.md
    description: "Exercise your testing pipeline"
  exploration:
    ideate_prompt: prompts/ideate-exploration.md
    description: "Explore coverage gaps"
  ui:
    ideate_prompt: prompts/ideate-ui.md
    description: "UI-driven loop: one browser flow per iteration, finds bugs early"
